<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Tetris DX!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0d0221;font-family:'Courier New',monospace;overflow:hidden;position:relative;
}

/* 背景パーティクル */
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}

/* メインコンテンツ */
.container{
  position:relative;z-index:1;text-align:center;padding:40px 24px;
  display:flex;flex-direction:column;align-items:center;gap:40px;
}

/* タイトル */
.title{
  font-size:clamp(2.4rem,8vw,4.5rem);font-weight:900;letter-spacing:.04em;
  background:linear-gradient(135deg,#ff4ea8,#ffe94e,#4ef0ff,#ff4ea8);
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:gradShift 4s ease infinite, titleDrop .8s cubic-bezier(.22,1,.36,1) both;
  filter:drop-shadow(0 0 30px rgba(255,78,168,.4));
}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes titleDrop{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}

.subtitle{
  font-size:clamp(.8rem,2.5vw,1rem);color:rgba(255,255,255,.5);letter-spacing:.2em;
  text-transform:uppercase;margin-top:-28px;
  animation:fadeIn 1s .4s both;
}

/* ブロックデコレーション */
.blocks-row{
  display:flex;gap:10px;
  animation:fadeIn .8s .2s both;
}
.blk{
  width:36px;height:36px;border-radius:6px;
  box-shadow:0 0 12px currentColor;
  animation:float 3s ease-in-out infinite;
}
.blk:nth-child(1){background:#4ef0ff;color:#4ef0ff;animation-delay:0s;}
.blk:nth-child(2){background:#ffe94e;color:#ffe94e;animation-delay:.3s;}
.blk:nth-child(3){background:#d44eff;color:#d44eff;animation-delay:.6s;}
.blk:nth-child(4){background:#4eff9a;color:#4eff9a;animation-delay:.9s;}
.blk:nth-child(5){background:#ff4e4e;color:#ff4e4e;animation-delay:1.2s;}
.blk:nth-child(6){background:#4e8aff;color:#4e8aff;animation-delay:1.5s;}
.blk:nth-child(7){background:#ff9a4e;color:#ff9a4e;animation-delay:1.8s;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* 言語選択カード */
.lang-cards{
  display:flex;gap:24px;flex-wrap:wrap;justify-content:center;
  animation:fadeIn 1s .6s both;
}
.lang-card{
  width:220px;padding:32px 24px;
  background:rgba(255,255,255,.05);
  border:2px solid rgba(255,255,255,.12);
  border-radius:20px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  text-decoration:none;
  transition:transform .2s, border-color .2s, background .2s, box-shadow .2s;
  position:relative;overflow:hidden;
}
.lang-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,78,168,.15),rgba(78,240,255,.1));
  opacity:0;transition:opacity .2s;
}
.lang-card:hover{
  transform:translateY(-6px) scale(1.03);
  border-color:rgba(255,255,255,.35);
  box-shadow:0 20px 60px rgba(0,0,0,.5), 0 0 40px rgba(255,78,168,.2);
}
.lang-card:hover::before{opacity:1;}

.lang-card .flag{font-size:3rem;line-height:1;}
.lang-card .lang-name{
  font-size:1.3rem;font-weight:900;color:#fff;letter-spacing:.05em;
}
.lang-card .lang-sub{
  font-size:.75rem;color:rgba(255,255,255,.45);letter-spacing:.1em;
}
.lang-card .play-btn{
  margin-top:4px;padding:10px 28px;
  border:none;border-radius:50px;cursor:pointer;
  font-family:inherit;font-size:.85rem;font-weight:800;
  transition:.15s;pointer-events:none;
}
.lang-card.ja .play-btn{
  background:linear-gradient(135deg,#ff4ea8,#c450ff);
  color:#fff;box-shadow:0 4px 20px rgba(255,78,168,.5);
}
.lang-card.en .play-btn{
  background:linear-gradient(135deg,#4e8aff,#4ef0ff);
  color:#000;box-shadow:0 4px 20px rgba(78,144,255,.5);
}

/* フッター */
.footer{
  font-size:.7rem;color:rgba(255,255,255,.2);letter-spacing:.1em;
  animation:fadeIn 1s 1s both;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* レスポンシブ */
@media(max-width:500px){
  .lang-cards{flex-direction:column;align-items:center;}
  .blocks-row .blk{width:28px;height:28px;}
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="container">

  <div class="blocks-row">
    <div class="blk"></div>
    <div class="blk"></div>
    <div class="blk"></div>
    <div class="blk"></div>
    <div class="blk"></div>
    <div class="blk"></div>
    <div class="blk"></div>
  </div>

  <div>
    <div class="title">TETRIS DX</div>
    <div class="subtitle">Choose your language</div>
  </div>

  <div class="lang-cards">
    <a class="lang-card ja" href="tetris_online.html">
      <div class="flag">🇯🇵</div>
      <div class="lang-name">日本語</div>
      <div class="lang-sub">JAPANESE</div>
      <button class="play-btn">▶ プレイする</button>
    </a>
    <a class="lang-card en" href="tetris_online_en.html">
      <div class="flag">🌍</div>
      <div class="lang-name">English</div>
      <div class="lang-sub">ENGLISH</div>
      <button class="play-btn">▶ Play Now</button>
    </a>
  </div>

  <div class="footer">© 2025 TETRIS DX — Powered by Supabase &amp; Vercel</div>

</div>

<script>
// 背景パーティクル
const cvs = document.getElementById('bgCanvas');
const bCtx = cvs.getContext('2d');
let parts = [];

function initBG() {
  cvs.width = window.innerWidth;
  cvs.height = window.innerHeight;
  parts = Array.from({ length: 120 }, () => ({
    x: Math.random() * cvs.width,
    y: Math.random() * cvs.height,
    r: Math.random() * 1.8 + .3,
    alpha: Math.random() * .6 + .1,
    vx: (Math.random() - .5) * .25,
    vy: (Math.random() - .5) * .25,
    color: ['#ff4ea8','#ffe94e','#4ef0ff','#4eff9a','#d44eff'][Math.floor(Math.random() * 5)]
  }));
}

function drawBG() {
  bCtx.clearRect(0, 0, cvs.width, cvs.height);
  parts.forEach(s => {
    s.alpha += (Math.random() - .5) * .03;
    s.alpha = Math.max(.05, Math.min(.7, s.alpha));
    s.x = (s.x + s.vx + cvs.width) % cvs.width;
    s.y = (s.y + s.vy + cvs.height) % cvs.height;
    bCtx.globalAlpha = s.alpha * .5;
    bCtx.fillStyle = s.color;
    bCtx.beginPath();
    bCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bCtx.fill();
  });
  bCtx.globalAlpha = 1;
  requestAnimationFrame(drawBG);
}

window.addEventListener('resize', initBG);
initBG();
drawBG();
</script>
</body>
</html>
